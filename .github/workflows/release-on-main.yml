name: Release On Main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release-on-main.yml"
      - ".github/workflows/release-pipeline.yml"
      - "config/release-intent.json"
      - "config/runtime-contract.json"
      - "plugin/**"
      - "skill/**"
      - "mcp/**"
      - "!mcp/package.json"
      - "!mcp/package-lock.json"
      - "scripts/**"
      - "setup.ps1"
      - "setup.cmd"
      - "README.md"
      - "README.en.md"
      - "docs/release/**"
      - "docs/user/**"
      - "docs/roadmap.md"
      - "SECURITY.md"
      - "CHANGELOG.md"

concurrency:
  group: codex-praetor-release-main
  cancel-in-progress: false

# Do not provide workflow_dispatch. A release incident after a tag or draft
# exists must be re-run from the original workflow run, which preserves its
# exact SHA. A new branch head must never revive an older version/tag.
jobs:
  release:
    permissions:
      contents: write
    uses: ./.github/workflows/release-pipeline.yml
    with:
      publish: true
      base_ref: ${{ github.event.before }}
