name: Release On Main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-on-main.yml"
      - "config/release-intent.json"
      - "config/runtime-contract.json"
      - "plugin/**"
      - "skill/**"
      - "mcp/**"
      - "scripts/**"
      - "setup.ps1"
      - "setup.cmd"
      - "README.md"
      - "README.en.md"
      - "docs/release/**"
      - "docs/user/**"
      - "docs/roadmap.md"
      - "SECURITY.md"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-praetor-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout merged main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci

      - name: Read release intent
        id: intent
        shell: pwsh
        run: |
          $intent = Get-Content .\config\release-intent.json -Raw | ConvertFrom-Json
          "version=$($intent.version)" >> $env:GITHUB_OUTPUT
          "tag=$($intent.tag)" >> $env:GITHUB_OUTPUT

      - name: Validate merged release intent
        shell: pwsh
        env:
          BASE_REF: ${{ github.event.before }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify\test-release-intent.ps1 -BaseRef "$env:BASE_REF" -CheckRemote -RequireReleaseImpact

      - name: MCP tests
        working-directory: mcp
        run: npm test

      - name: Product validation
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify\test-codex-praetor.ps1

      - name: Public entry consistency
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify\test-public-entry-consistency.ps1 -Version "${{ steps.intent.outputs.version }}" -SkipRemoteRelease

      - name: Release package determinism
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify\test-release-package-determinism.ps1

      - name: Publish immutable Release from this merge commit
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\publish-github-release-asset.ps1 `
            -Version "${{ steps.intent.outputs.version }}" `
            -Tag "${{ steps.intent.outputs.tag }}" `
            -OutputRoot ".codex-praetor\ci-release" `
            -AllowDetachedHead `
            -Apply
