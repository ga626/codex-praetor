name: Release Pipeline

on:
  workflow_call:
    inputs:
      publish:
        description: "Publish the already-validated candidate from main."
        required: true
        type: boolean
      base_ref:
        description: "Target branch commit used for release-impact comparison."
        required: false
        type: string

# Candidate and publication call this one preflight; callers supply permissions.
jobs:
  candidate_or_release:
    runs-on: windows-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Candidate preflight
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $arguments = @('-BaseRef', '${{ inputs.base_ref }}', '-CheckRemote')
          if ('${{ inputs.publish }}' -ne 'true') { $arguments += '-AllowDraftMetadataPlaceholders' }
          & powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify\invoke-release-candidate-preflight.ps1 @arguments
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish immutable Release from this exact main commit
        if: ${{ inputs.publish }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $intent = Get-Content .\config\release-intent.json -Raw | ConvertFrom-Json
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\publish-github-release-asset.ps1 `
            -Version "$($intent.version)" `
            -Tag "$($intent.tag)" `
            -AllowDetachedHead `
            -ResumeExistingRelease `
            -Apply
