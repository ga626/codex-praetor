name: CI

on:
  pull_request:

# The candidate and publication paths deliberately share one reusable workflow.
# A release-only action pin cannot be green in PR CI and fail only after merge.
jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/release-pipeline.yml
    with:
      publish: false
      # A release PR may have several commits. On branch pushes, compare the
      # whole candidate with the protected target branch, not only its previous
      # branch commit, otherwise follow-up fixes are falsely rejected for not
      # carrying a second release intent.
      base_ref: ${{ github.event.pull_request.base.sha || 'origin/main' }}
