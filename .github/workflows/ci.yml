name: CI

on:
  push:
  pull_request:

# The candidate and publication paths deliberately share one reusable workflow.
# A release-only action pin cannot be green in PR CI and fail only after merge.
jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/release-pipeline.yml
    with:
      publish: false
      base_ref: ${{ github.event.pull_request.base.sha || github.event.before }}
