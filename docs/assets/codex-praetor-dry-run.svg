<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Praetor dry-run terminal example</title>
  <desc id="desc">A static screenshot-style illustration showing a successful Codex Praetor dry-run result.</desc>
  <rect width="1280" height="720" fill="#111827"/>
  <rect x="88" y="72" width="1104" height="576" rx="14" fill="#0B1220" stroke="#334155" stroke-width="2"/>
  <circle cx="124" cy="108" r="9" fill="#EF4444"/>
  <circle cx="154" cy="108" r="9" fill="#F59E0B"/>
  <circle cx="184" cy="108" r="9" fill="#10B981"/>
  <text x="88" y="690" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Codex Praetor / Codex 执政官</text>
  <text x="128" y="174" fill="#E5E7EB" font-family="Consolas, 'Courier New', monospace" font-size="30">拆分一下任务，分配给其他 agent 做 dry-run，不要真实修改文件。</text>
  <text x="128" y="236" fill="#22C55E" font-family="Consolas, 'Courier New', monospace" font-size="28">[PASS] route = codex_praetor_external_worker</text>
  <text x="128" y="294" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="26">provider = codebuddy</text>
  <text x="128" y="342" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="26">tier     = codebuddy-free</text>
  <text x="128" y="390" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="26">mode     = readonly</text>
  <text x="128" y="438" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="26">dry_run  = true</text>
  <text x="128" y="506" fill="#FBBF24" font-family="Consolas, 'Courier New', monospace" font-size="26">No native Codex subagent was created.</text>
  <text x="128" y="554" fill="#93C5FD" font-family="Consolas, 'Courier New', monospace" font-size="26">No files were modified.</text>
</svg>
